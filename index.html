<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>금형 관리 시스템</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', 'Nanum Gothic', sans-serif;
    background: #f0f2f5;
    color: #333;
    font-size: 14px;
  }

  header {
    background: #1a3a5c;
    color: #fff;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }
  header h1 { font-size: 20px; font-weight: 700; letter-spacing: 1px; }
  header span { font-size: 12px; opacity: 0.7; margin-left: auto; }

  .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

  /* 검색창 */
  .search-section {
    background: #fff;
    border-radius: 10px;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    margin-bottom: 20px;
  }
  .search-section label { font-weight: 700; color: #1a3a5c; white-space: nowrap; font-size: 15px; }
  .search-section input {
    flex: 1;
    max-width: 280px;
    padding: 10px 14px;
    border: 2px solid #d0d7e3;
    border-radius: 6px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-section input:focus { border-color: #2e7ef7; }
  .btn { padding: 9px 20px; border: none; border-radius: 6px; font-size: 14px; font-family: inherit; cursor: pointer; font-weight: 600; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: #2e7ef7; color: #fff; }
  .btn-secondary { background: #6c757d; color: #fff; }
  .btn-danger { background: #e74c3c; color: #fff; }
  .btn-sm { padding: 5px 12px; font-size: 12px; }
  .btn-success { background: #27ae60; color: #fff; }

  /* 카드 */
  .card {
    background: #fff;
    border-radius: 10px;
    padding: 20px 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    margin-bottom: 18px;
    border-left: 4px solid #2e7ef7;
  }
  .card h2 {
    font-size: 15px;
    font-weight: 700;
    color: #1a3a5c;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card h2 .card-icon { margin-right: 6px; }

  /* 기본정보 테이블 */
  .info-grid {
    display: grid;
    grid-template-columns: 120px 1fr 120px 1fr;
    gap: 0;
    border: 1px solid #e0e6ef;
    border-radius: 6px;
    overflow: hidden;
  }
  .info-grid .lbl {
    background: #f5f7fa;
    padding: 10px 14px;
    font-weight: 700;
    color: #555;
    border-bottom: 1px solid #e0e6ef;
    border-right: 1px solid #e0e6ef;
  }
  .info-grid .val {
    padding: 10px 14px;
    border-bottom: 1px solid #e0e6ef;
    border-right: 1px solid #e0e6ef;
    color: #222;
  }
  .info-grid .lbl:nth-last-child(-n+4),
  .info-grid .val:nth-last-child(-n+4) { border-bottom: none; }

  /* 생산 수량 */
  .stats-row {
    display: flex;
    gap: 16px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .stat-box {
    flex: 1;
    min-width: 150px;
    background: #f5f7fa;
    border-radius: 8px;
    padding: 16px 20px;
    text-align: center;
    border: 1px solid #e0e6ef;
  }
  .stat-box .stat-label { font-size: 12px; color: #777; margin-bottom: 6px; }
  .stat-box .stat-value { font-size: 26px; font-weight: 700; color: #1a3a5c; }
  .stat-box .stat-unit { font-size: 13px; color: #555; margin-left: 2px; }
  .stat-box.highlight { background: #e8f4ff; border-color: #b3d4fb; }
  .stat-box.good .stat-value { color: #27ae60; }
  .stat-box.warning .stat-value { color: #e67e22; }
  .stat-box.danger .stat-value { color: #e74c3c; }

  .progress-wrap { background: #e0e6ef; border-radius: 99px; height: 14px; overflow: hidden; }
  .progress-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, #2e7ef7, #00c6ae);
    width: 0%;
    transition: width 0.7s ease;
  }
  .progress-fill.warning { background: linear-gradient(90deg, #e67e22, #f39c12); }
  .progress-fill.danger  { background: linear-gradient(90deg, #e74c3c, #c0392b); }
  .progress-label { text-align: right; font-size: 11px; color: #888; margin-top: 4px; }

  /* 수리이력 테이블 */
  .repair-table { width: 100%; border-collapse: collapse; margin-top: 4px; }
  .repair-table th {
    background: #f5f7fa;
    padding: 10px 12px;
    text-align: left;
    font-weight: 700;
    color: #555;
    border-bottom: 2px solid #e0e6ef;
    font-size: 13px;
  }
  .repair-table td {
    padding: 10px 12px;
    border-bottom: 1px solid #f0f0f0;
    vertical-align: middle;
  }
  .repair-table tr:last-child td { border-bottom: none; }
  .repair-table tr:nth-child(even) td { background: #fafbfc; }
  .repair-table tr:hover td { background: #f0f5ff; }

  .no-data { text-align: center; padding: 24px; color: #aaa; font-size: 14px; }

  /* 알림 메시지 */
  #no-result {
    text-align: center;
    padding: 40px;
    color: #e74c3c;
    font-size: 16px;
    font-weight: 700;
    background: #fff5f5;
    border-radius: 10px;
    border: 1px solid #f5c6cb;
  }

  .hidden { display: none !important; }

  /* 모달 */
  #modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
  }
  #modal {
    background: #fff;
    border-radius: 12px;
    padding: 28px 32px;
    width: 480px;
    max-width: 95vw;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  }
  #modal h3 { font-size: 17px; color: #1a3a5c; margin-bottom: 20px; font-weight: 700; }
  .form-row { margin-bottom: 14px; }
  .form-row label { display: block; font-weight: 700; color: #555; margin-bottom: 5px; font-size: 13px; }
  .form-row input, .form-row textarea {
    width: 100%;
    padding: 9px 12px;
    border: 1.5px solid #d0d7e3;
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-row input:focus, .form-row textarea:focus { border-color: #2e7ef7; }
  .form-row input.error { border-color: #e74c3c; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

  /* 반응형 */
  @media (max-width: 768px) {
    .info-grid { grid-template-columns: 100px 1fr; }
    .info-grid .val:nth-child(4n) { border-right: none; }
    .stats-row { flex-direction: column; }
    .repair-table { display: block; overflow-x: auto; }
    .search-section { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<header>
  <h1>⚙ 금형 관리 시스템</h1>
  <span id="today-date"></span>
</header>

<div class="container">

  <!-- 검색창 -->
  <div class="search-section">
    <label for="search-input">품번 검색</label>
    <input type="text" id="search-input" placeholder="품번 입력 (예: PA-1001)" autocomplete="off">
    <button class="btn btn-primary" id="search-btn">검색</button>
    <button class="btn btn-secondary" id="reset-btn">초기화</button>
  </div>

  <!-- 결과 없음 -->
  <div id="no-result" class="hidden">해당 품번을 찾을 수 없습니다.</div>

  <!-- 대시보드 -->
  <div id="dashboard" class="hidden">

    <!-- 기본 금형 정보 -->
    <div class="card">
      <h2><span class="card-icon">📋</span> 기본 금형 정보</h2>
      <div class="info-grid" id="basic-info-grid"></div>
    </div>

    <!-- 생산 수량 -->
    <div class="card">
      <h2><span class="card-icon">📊</span> 생산 수량</h2>
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-label">현재 타수</div>
          <div><span class="stat-value" id="stat-current">-</span><span class="stat-unit">shot</span></div>
        </div>
        <div class="stat-box">
          <div class="stat-label">목표 타수</div>
          <div><span class="stat-value" id="stat-target">-</span><span class="stat-unit">shot</span></div>
        </div>
        <div class="stat-box highlight" id="stat-rate-box">
          <div class="stat-label">가동률</div>
          <div><span class="stat-value" id="stat-rate">-</span><span class="stat-unit">%</span></div>
        </div>
      </div>
      <div class="progress-wrap">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="progress-label" id="progress-label"></div>
    </div>

    <!-- 수리이력 -->
    <div class="card">
      <h2>
        <span><span class="card-icon">🔧</span> 수리이력</span>
        <button class="btn btn-success btn-sm" id="add-repair-btn">+ 수리 추가</button>
      </h2>
      <div id="repair-section">
        <p class="no-data hidden" id="no-repair-msg">등록된 수리이력이 없습니다.</p>
        <div style="overflow-x:auto;">
          <table class="repair-table hidden" id="repair-table">
            <thead>
              <tr>
                <th>수리일자</th>
                <th>수리내용</th>
                <th>수리업체</th>
                <th>비용</th>
                <th>담당자</th>
                <th style="width:100px; text-align:center;">관리</th>
              </tr>
            </thead>
            <tbody id="repair-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- 수리이력 모달 -->
<div id="modal-overlay" class="hidden">
  <div id="modal">
    <h3 id="modal-title">수리이력 추가</h3>
    <div class="form-row">
      <label>수리일자 <span style="color:#e74c3c">*</span></label>
      <input type="date" id="f-date">
    </div>
    <div class="form-row">
      <label>수리내용 <span style="color:#e74c3c">*</span></label>
      <input type="text" id="f-content" placeholder="수리 내용을 입력하세요">
    </div>
    <div class="form-row">
      <label>수리업체</label>
      <input type="text" id="f-vendor" placeholder="수리 업체명">
    </div>
    <div class="form-row">
      <label>비용 (원)</label>
      <input type="number" id="f-cost" placeholder="0" min="0">
    </div>
    <div class="form-row">
      <label>담당자 <span style="color:#e74c3c">*</span></label>
      <input type="text" id="f-manager" placeholder="담당자명">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="modal-cancel">취소</button>
      <button class="btn btn-primary" id="modal-save">저장</button>
    </div>
  </div>
</div>

<script>
// ---- 샘플 데이터 ----
const DEFAULT_DATA = [
  {
    품번: 'PA-1001', 금형명: '사이드미러 브라켓', 금형번호: 'MD-2021-001',
    재질: 'S45C', 캐비티수: 2, 제작일자: '2021-03-15', 제작업체: '대한금형(주)',
    현재타수: 87430, 목표타수: 150000,
    수리이력: [
      { id: 1, 수리일자: '2023-06-10', 수리내용: '코어 마모 교체', 수리업체: '정밀금형기술', 비용: 850000, 담당자: '김철수' },
      { id: 2, 수리일자: '2024-11-22', 수리내용: '이젝터핀 교체', 수리업체: '정밀금형기술', 비용: 320000, 담당자: '이영희' }
    ]
  },
  {
    품번: 'PA-1002', 금형명: '도어 인너패널', 금형번호: 'MD-2020-007',
    재질: 'NAK80', 캐비티수: 1, 제작일자: '2020-08-20', 제작업체: '한국정밀금형',
    현재타수: 142000, 목표타수: 200000,
    수리이력: []
  },
  {
    품번: 'PB-2001', 금형명: '범퍼 마운팅 클립', 금형번호: 'MD-2022-015',
    재질: 'SKD11', 캐비티수: 4, 제작일자: '2022-01-10', 제작업체: '신성금형',
    현재타수: 241500, 목표타수: 300000,
    수리이력: [
      { id: 1, 수리일자: '2024-03-05', 수리내용: '캐비티 표면 폴리싱', 수리업체: '신성금형', 비용: 480000, 담당자: '박민준' }
    ]
  }
];

// ---- 데이터 로드 (localStorage 우선) ----
let moldData = (() => {
  try {
    const saved = localStorage.getItem('moldData');
    return saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_DATA));
  } catch { return JSON.parse(JSON.stringify(DEFAULT_DATA)); }
})();

function saveData() {
  localStorage.setItem('moldData', JSON.stringify(moldData));
}

// ---- 상태 ----
let currentMold = null;
let editRepairId = null;

// ---- 유틸 ----
function formatDate(d) {
  if (!d) return '-';
  const [y, m, day] = d.split('-');
  return `${y}년 ${m}월 ${day}일`;
}
function formatNum(n) {
  return Number(n).toLocaleString('ko-KR');
}
function formatCost(n) {
  return Number(n).toLocaleString('ko-KR') + '원';
}
function today() {
  return new Date().toISOString().split('T')[0];
}
function rateClass(r) {
  if (r >= 80) return 'good';
  if (r >= 50) return 'warning';
  return 'danger';
}

// ---- 렌더링 ----
function renderBasicInfo(m) {
  const fields = [
    ['품번', m.품번], ['금형명', m.금형명],
    ['금형번호', m.금형번호], ['재질', m.재질],
    ['캐비티 수', m.캐비티수 + ' cavity'], ['제작일자', formatDate(m.제작일자)],
    ['제작업체', m.제작업체], ['', '']
  ];
  const grid = document.getElementById('basic-info-grid');
  grid.innerHTML = fields.map(([l, v]) =>
    `<div class="lbl">${l}</div><div class="val">${v}</div>`
  ).join('');
}

function renderProduction(m) {
  const rate = Math.round((m.현재타수 / m.목표타수) * 100);
  const cls = rateClass(rate);

  document.getElementById('stat-current').textContent = formatNum(m.현재타수);
  document.getElementById('stat-target').textContent = formatNum(m.목표타수);
  document.getElementById('stat-rate').textContent = rate;

  const rateBox = document.getElementById('stat-rate-box');
  rateBox.className = 'stat-box highlight ' + cls;

  const fill = document.getElementById('progress-fill');
  fill.className = 'progress-fill';
  if (cls === 'warning') fill.classList.add('warning');
  if (cls === 'danger') fill.classList.add('danger');
  fill.style.width = '0%';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    fill.style.width = Math.min(rate, 100) + '%';
  }));

  document.getElementById('progress-label').textContent =
    `${formatNum(m.현재타수)} / ${formatNum(m.목표타수)} shot`;
}

function renderRepairTable(m) {
  const tbody = document.getElementById('repair-tbody');
  const table = document.getElementById('repair-table');
  const noMsg = document.getElementById('no-repair-msg');

  if (!m.수리이력 || m.수리이력.length === 0) {
    table.classList.add('hidden');
    noMsg.classList.remove('hidden');
    return;
  }
  noMsg.classList.add('hidden');
  table.classList.remove('hidden');

  tbody.innerHTML = m.수리이력.map(r => `
    <tr>
      <td>${formatDate(r.수리일자)}</td>
      <td>${r.수리내용}</td>
      <td>${r.수리업체 || '-'}</td>
      <td>${r.비용 ? formatCost(r.비용) : '-'}</td>
      <td>${r.담당자}</td>
      <td style="text-align:center; white-space:nowrap;">
        <button class="btn btn-primary btn-sm btn-edit" data-id="${r.id}">수정</button>
        <button class="btn btn-danger btn-sm btn-delete" data-id="${r.id}" style="margin-left:4px;">삭제</button>
      </td>
    </tr>
  `).join('');
}

function renderDashboard(m) {
  currentMold = m;
  renderBasicInfo(m);
  renderProduction(m);
  renderRepairTable(m);
  document.getElementById('dashboard').classList.remove('hidden');
  document.getElementById('no-result').classList.add('hidden');
}

// ---- 검색 ----
function searchMold() {
  const q = document.getElementById('search-input').value.trim().toUpperCase();
  if (!q) return;
  const found = moldData.find(m => m.품번.toUpperCase() === q);
  if (found) {
    renderDashboard(found);
  } else {
    document.getElementById('dashboard').classList.add('hidden');
    document.getElementById('no-result').classList.remove('hidden');
  }
}

function clearDashboard() {
  document.getElementById('search-input').value = '';
  document.getElementById('dashboard').classList.add('hidden');
  document.getElementById('no-result').classList.add('hidden');
  currentMold = null;
}

// ---- 모달 ----
function openModal(title, repair) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('f-date').value = repair ? repair.수리일자 : today();
  document.getElementById('f-content').value = repair ? repair.수리내용 : '';
  document.getElementById('f-vendor').value = repair ? (repair.수리업체 || '') : '';
  document.getElementById('f-cost').value = repair ? (repair.비용 || '') : '';
  document.getElementById('f-manager').value = repair ? repair.담당자 : '';
  ['f-date','f-content','f-manager'].forEach(id => document.getElementById(id).classList.remove('error'));
  document.getElementById('modal-overlay').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
  editRepairId = null;
}

function openAddModal() {
  editRepairId = null;
  openModal('수리이력 추가', null);
}

function openEditModal(repairId) {
  editRepairId = repairId;
  const r = currentMold.수리이력.find(x => x.id === repairId);
  openModal('수리이력 수정', r);
}

function saveRepair() {
  const date = document.getElementById('f-date').value;
  const content = document.getElementById('f-content').value.trim();
  const vendor = document.getElementById('f-vendor').value.trim();
  const cost = document.getElementById('f-cost').value;
  const manager = document.getElementById('f-manager').value.trim();

  let valid = true;
  [['f-date', date], ['f-content', content], ['f-manager', manager]].forEach(([id, val]) => {
    const el = document.getElementById(id);
    if (!val) { el.classList.add('error'); valid = false; }
    else el.classList.remove('error');
  });
  if (!valid) return;

  if (editRepairId === null) {
    const maxId = currentMold.수리이력.reduce((mx, r) => Math.max(mx, r.id), 0);
    currentMold.수리이력.push({ id: maxId + 1, 수리일자: date, 수리내용: content, 수리업체: vendor, 비용: cost ? Number(cost) : 0, 담당자: manager });
  } else {
    const r = currentMold.수리이력.find(x => x.id === editRepairId);
    if (r) { r.수리일자 = date; r.수리내용 = content; r.수리업체 = vendor; r.비용 = cost ? Number(cost) : 0; r.담당자 = manager; }
  }

  saveData();
  renderRepairTable(currentMold);
  closeModal();
}

function deleteRepair(repairId) {
  if (!confirm('이 수리이력을 삭제하시겠습니까?')) return;
  currentMold.수리이력 = currentMold.수리이력.filter(r => r.id !== repairId);
  saveData();
  renderRepairTable(currentMold);
}

// ---- 이벤트 ----
document.getElementById('search-btn').addEventListener('click', searchMold);
document.getElementById('reset-btn').addEventListener('click', clearDashboard);
document.getElementById('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') searchMold(); });
document.getElementById('add-repair-btn').addEventListener('click', openAddModal);
document.getElementById('modal-save').addEventListener('click', saveRepair);
document.getElementById('modal-cancel').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target === document.getElementById('modal-overlay')) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

document.getElementById('repair-tbody').addEventListener('click', e => {
  const editBtn = e.target.closest('.btn-edit');
  const delBtn = e.target.closest('.btn-delete');
  if (editBtn) openEditModal(Number(editBtn.dataset.id));
  if (delBtn) deleteRepair(Number(delBtn.dataset.id));
});

// ---- 초기화 ----
document.getElementById('today-date').textContent = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
</script>
</body>
</html>
