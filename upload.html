const { createClient } = window.supabase;
const sb = createClient(
  '__SUPABASE_URL__',
  '__SUPABASE_ANON_KEY__'
);

function log(msg, cls='info') {
  const el = document.getElementById('log');
  el.innerHTML += '<span class="' + cls + '">' + msg + '</span><br>';
  el.scrollTop = el.scrollHeight;
}

async function upload() {
  const btn = document.getElementById('btn');
  const prog = document.getElementById('prog');
  btn.disabled = true;
  document.getElementById('log').innerHTML = '';
  prog.style.display = 'block';

  // 기존 데이터 확인
  log('기존 데이터 확인 중...');
  const { data: existing } = await sb.from('molds').select('part_id');
  if (existing && existing.length > 0) {
    log('이미 ' + existing.length + '개 데이터가 있습니다. upsert로 진행합니다.', 'info');
  }

  const CHUNK = 30;
  const total = MOLD_DATA_SEED.length;
  let success = 0, fail = 0;

  log('총 ' + total + '개 금형 업로드 시작...');

  for (let i = 0; i < total; i += CHUNK) {
    const chunk = MOLD_DATA_SEED.slice(i, i + CHUNK);
    const { error } = await sb.from('molds').upsert(chunk, { onConflict: 'part_id' });
    if (error) {
      log('오류 [' + i + '~' + (i+chunk.length) + ']: ' + error.message, 'err');
      fail += chunk.length;
    } else {
      success += chunk.length;
    }
    prog.value = Math.round(((i + chunk.length) / total) * 100);
    log((i + chunk.length) + ' / ' + total + ' 처리 완료');
    await new Promise(r => setTimeout(r, 100));
  }

  if (fail === 0) {
    log('완료! ' + success + '개 업로드 성공 ✓', 'ok');
    log('이제 index.html을 열면 Supabase에서 데이터를 불러옵니다.', 'ok');
  } else {
    log('완료 (성공: ' + success + ', 실패: ' + fail + ')', 'err');
  }
  btn.disabled = false;
}
